name: Release

on:
  workflow_run:
    workflows: ["CI", "CodeQL"]
    types: [completed]
    branches: [main, master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Verify all required checks passed
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"

          get_conclusion() {
            gh api "repos/$REPO/actions/runs?head_sha=$SHA&status=completed" \
              --jq "[.workflow_runs[] | select(.name == \"$1\")] | first | .conclusion // \"pending\""
          }

          CI_STATUS=$(get_conclusion "CI")
          CODEQL_STATUS=$(get_conclusion "CodeQL")

          echo "CI=$CI_STATUS  CodeQL=$CODEQL_STATUS"

          if [ "$CI_STATUS" = "success" ] && [ "$CODEQL_STATUS" = "success" ]; then
            echo "all_passed=true" >> $GITHUB_OUTPUT
          else
            echo "all_passed=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.all_passed == 'true'
        with:
          fetch-depth: 0
          # Check out the branch tip (not the detached SHA) so the cosmetic
          # package.json bump can be pushed back.
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Determine the release version automatically from Conventional Commit
      # messages since the last tag — no manual package.json bump required.
      #   <type>!:  / "BREAKING CHANGE"  -> major
      #   feat:                          -> minor
      #   fix: / perf:                   -> patch
      #   only chore/docs/ci/etc.        -> no release
      # The app reports its version via `git describe --tags` (lib/version.ts),
      # so the git tag is the source of truth; package.json is kept in sync only
      # for cosmetic/tooling consistency.
      - name: Compute next version from commits
        if: steps.gate.outputs.all_passed == 'true'
        id: version
        run: |
          set -euo pipefail
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$LAST_TAG" ]; then
            BASE="0.0.0"; RANGE="HEAD"
          else
            BASE="${LAST_TAG#v}"; RANGE="${LAST_TAG}..HEAD"
          fi

          LOG=$(git log $RANGE --pretty=format:'%s%n%b' || true)
          if [ -z "$(echo "$LOG" | tr -d '[:space:]')" ]; then
            echo "No new commits since ${LAST_TAG:-<root>} — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          BUMP=""
          if echo "$LOG" | grep -qE '^[a-z]+(\([^)]*\))?!:' || echo "$LOG" | grep -q 'BREAKING CHANGE'; then
            BUMP=major
          elif echo "$LOG" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP=minor
          elif echo "$LOG" | grep -qE '^(fix|perf)(\([^)]*\))?:'; then
            BUMP=patch
          fi

          if [ -z "$BUMP" ]; then
            echo "Only non-release commits since ${LAST_TAG:-<root>} — skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          IFS=. read -r MA MI PA <<< "$BASE"
          case "$BUMP" in
            major) MA=$((MA + 1)); MI=0; PA=0;;
            minor) MI=$((MI + 1)); PA=0;;
            patch) PA=$((PA + 1));;
          esac
          NEXT="v${MA}.${MI}.${PA}"
          echo "Bump: $BUMP   ${LAST_TAG:-<root>} -> $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"

      - name: Guard against existing tag
        if: steps.gate.outputs.all_passed == 'true' && steps.version.outputs.release == 'true'
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version }} already exists — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag, sync package.json, and create GitHub Release
        if: steps.gate.outputs.all_passed == 'true' && steps.version.outputs.release == 'true' && steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEXT="${{ steps.version.outputs.version }}"

          # Keep package.json's version field in sync (cosmetic). [skip ci] stops
          # this commit from re-triggering CI -> Release (no release loop).
          jq ".version = \"${NEXT#v}\"" package.json > package.json.tmp
          mv package.json.tmp package.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --cached --quiet; then
            echo "package.json already at ${NEXT#v}."
          else
            git commit -m "chore(release): $NEXT [skip ci]"
            git push origin "HEAD:${{ github.event.workflow_run.head_branch }}"
          fi

          git tag "$NEXT"
          git push origin "$NEXT"
          gh release create "$NEXT" --title "$NEXT" --generate-notes
